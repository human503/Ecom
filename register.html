<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;1,300&display=swap"
    rel="stylesheet" />
  <script type="module" src="register.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1a2e;
      --mist: #f0f2f8;
      --slate: #6b7280;
      --accent: #4f46e5;
      --accent-lt: #ede9fe;
      --danger: #dc2626;
      --radius: 12px;
    }

    .m1 {
      display: flex;
      width: 100%;
      height: 100%;
    }


    body {
      min-height: 100vh;
      display: flex;
      grid-template-columns: 1fr 1fr;
      font-family: 'Inter', sans-serif;
      background: var(--mist);
      color: var(--ink);
    }

    /* ── Left panel ── */
    .panel {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 56px;
      position: relative;
      overflow: hidden;
      width: 50%;
      flex: 1;
    }

    .panel-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .panel::before {
      content: '';
      position: absolute;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, #4f46e530 0%, transparent 70%);
      bottom: -120px;
      left: -80px;
    }

    .panel::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #818cf820 0%, transparent 70%);
      top: -60px;
      right: -60px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
    }

    .brand-icon svg {
      display: block;
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .panel-copy {
      position: relative;
      z-index: 1;
    }

    .panel-copy blockquote {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 2rem;
      line-height: 1.3;
      color: #e0e7ff;
      margin-bottom: 28px;
    }

    .testimonial {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #4f46e5);
      display: grid;
      place-items: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .testimonial-meta span {
      display: block;
    }

    .testimonial-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: #e0e7ff;
    }

    .testimonial-role {
      font-size: 0.75rem;
      color: #818cf8;
    }

    /* ── Right panel / form ── */
    .form-side {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      width: 50%;
      flex: 1;
    }

    .form-card {
      width: 100%;
      max-width: 400px;
    }

    .form-header {
      margin-bottom: 36px;
    }

    .form-header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .form-header p {
      font-size: 0.9rem;
      color: var(--slate);
    }

    .form-header p a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .form-header p a:hover {
      text-decoration: underline;
    }

    /* Fields */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-lt);
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .field-row label {
      margin-bottom: 0;
    }

    .forgot {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    /* Password wrapper */
    .pw-wrap {
      position: relative;
    }

    .pw-wrap input {
      padding-right: 44px;
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--slate);
      padding: 4px;
      display: grid;
      place-items: center;
    }

    .pw-toggle:hover {
      color: var(--ink);
    }

    /* Remember me */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .remember span {
      font-size: 0.85rem;
      color: var(--slate);
    }

    /* Submit */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-primary:active {
      transform: scale(0.99);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: #9ca3af;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* Social buttons */
    .socials {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .btn-social:hover {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    /* Error state example */
    .input-error {
      border-color: var(--danger) !important;
    }

    .error-msg {
      font-size: 0.78rem;
      color: var(--danger);
      margin-top: 4px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
      }

      .panel {
        display: none;
      }

      .form-side {
        padding: 48px 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
  <div class="m1">
    <aside class="panel">
      <div class="panel-bg">
        <GridMotion gradientColor="#5227FF" />
      </div>
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 9l4.5 4.5L15 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <span class="brand-name">ShopX</span>
      </div>

      <div class="panel-copy">
        <blockquote>"The simplest Ecommerce platform I've used."</blockquote>
      </div>
    </aside>



    <main class="form-side">
      <div class="form-card">

        <div class="form-header">
          <h1>Welcome back</h1>
          <p>No account yet? <a href="#">Create one free</a></p>
        </div>


        <div class="field">
          <label htmlFor="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="field">
          <div class="field-row">
            <label htmlFor="password">Password</label>
            <a href="#" class="forgot">Forgot password?</a>
          </div>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button class="pw-toggle" type="button" aria-label="Show password" onclick="togglePassword(this)">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="remember">
          <input type="checkbox" id="remember" />
          <span>Keep me signed in for 30 days</span>
        </div>

        <button id="loginBtn" class="btn-primary" type="button">Sign in</button>

        <div class="divider">or continue with</div>

        <div class="socials">
          <button class="btn-social" type="button">

            <svg width="17" height="17" viewBox="0 0 48 48">
              <path fill="#EA4335"
                d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.7 0 6.7 5.4 2.6 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z" />
              <path fill="#4285F4"
                d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17.3z" />
              <path fill="#FBBC05"
                d="M10.4 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.9-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.6 2.6 10.8l7.8-6.1z" />
              <path fill="#34A853"
                d="M24 48c6.3 0 11.6-2.1 15.4-5.7l-7.5-5.8c-2.1 1.4-4.8 2.2-7.9 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.7 42.6 14.7 48 24 48z" />
            </svg>
            Google
          </button>
          <button class="btn-social" type="button">

            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.01 2.04.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.93.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z" />
            </svg>
            GitHub
          </button>
        </div>

      </div>
    </main>
  </div>
</head>

<body>


  <script>
    function togglePassword(btn) {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      btn.querySelector('svg').innerHTML = isHidden
        ? `<line x1="1" y1="1" x2="23" y2="23"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  </script>

</body>

</html>
