<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <section class="bg-blue-500 text-white p-20 text-center">
        <h1 class="text-4xl font-bold">Welcome to Store</h1>
        <button class="mt-4 bg-white text-blue-500 px-4 py-2 rounded">Shop Now</button>
    </section>

    <section class="p-10">
        <h2 class="text-2xl font-bold mb-5">Categories</h2>
        <div class="flex gap-4">
            <div class="bg-white p-5 shadow flex-1 text-center">Electronics</div>
            <div class="bg-white p-5 shadow flex-1 text-center">Fashion</div>
        </div>
    </section>

    <section class="p-10 bg-white">
        <h2 class="text-2xl font-bold mb-5">Products</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="border p-4">
                <div class="bg-gray-200 h-32 mb-2"></div>
                <p>Product Name</p>
                <p class="font-bold">$10</p>
            </div>
            <div class="border p-4">
                <div class="bg-gray-200 h-32 mb-2"></div>
                <p>Product Name</p>
                <p class="font-bold">$20</p>
            </div>
        </div>
    </section>

    <section class="bg-yellow-400 p-10 text-center font-bold">
        SPECIAL OFFER: USE CODE 'NEEV10' FOR 10% OFF!
    </section>

</body>
</html>
